<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет интернета</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(135deg, #e5f0e2 0%, #c8e0c0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .offline-container {
            text-align: center;
            background: white;
            border-radius: 48px;
            padding: 40px 32px;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            color: #1f6e1c;
            font-size: 1.8rem;
            margin-bottom: 12px;
        }
        p {
            color: #5a7856;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .retry-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .retry-btn:hover {
            background: #1b5e20;
            transform: scale(1.02);
        }
        .offline-tips {
            margin-top: 24px;
            font-size: 12px;
            color: #8ba888;
            border-top: 1px solid #e0ecd9;
            padding-top: 20px;
        }
        .offline-tips ul {
            text-align: left;
            margin-top: 8px;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">🌐</div>
        <h1>Нет соединения</h1>
        <p>Проверьте подключение к интернету.<br>Некоторые функции могут быть недоступны.</p>
        <button class="retry-btn" onclick="location.reload()">🔄 Попробовать снова</button>
        <div class="offline-tips">
            <strong>💡 Совет:</strong>
            <ul>
                <li>Проверьте Wi-Fi или мобильные данные</li>
                <li>Включите/выключите режим полёта</li>
                <li>Перезагрузите приложение</li>
            </ul>
        </div>
    </div>
    <script>
        // Автоматическая попытка переподключения каждые 30 секунд
        setInterval(() => {
            if (navigator.onLine) {
                location.reload();
            }
        }, 30000);
        
        // Слушаем восстановление соединения
        window.addEventListener('online', () => {
            location.reload();
        });
    </script>
</body>
</html>
